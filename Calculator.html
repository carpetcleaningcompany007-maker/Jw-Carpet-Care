  <script>
    const DOC_PASSWORD = "knickersniffer";
    const VAT_RATE = 0.20;
    const MINIMUM_CHARGE = 100;

    const state = { qty:{} };
    let roomRows = [];
    let roomCounter = 0;
    let editingRoomId = null;
    let currentStep = 1;

    const pricing = {
      domestic: [
        { id:"living", name:"Living Room", desc:"Main family room", price:79, group:"Residential" },
        { id:"bedroom", name:"Bedroom", desc:"Standard bedroom", price:37, group:"Residential" },
        { id:"dining", name:"Dining Room", desc:"Dining or breakfast room", price:57, group:"Residential" },
        { id:"boxroom", name:"Box Room", desc:"Small bedroom or office", price:27, group:"Residential" },
        { id:"study", name:"Study", desc:"Office or spare room", price:27, group:"Residential" },
        { id:"loungediner", name:"Lounge Diner", desc:"Open plan room", price:99, group:"Residential" },
        { id:"stairslanding", name:"Stairs and Landing", desc:"Combined stairs and landing", price:75, group:"Residential" },
        { id:"rug_small", name:"Small Rug", desc:"Small rug clean", price:25, group:"Rugs" },
        { id:"rug_medium", name:"Medium Rug", desc:"Medium rug clean", price:35, group:"Rugs" },
        { id:"rug_large", name:"Large Rug", desc:"Large rug clean", price:49, group:"Rugs" },
        { id:"sofa_2", name:"2 Seat Sofa", desc:"Fabric or leather", price:80, group:"Upholstery" },
        { id:"sofa_3", name:"3 Seat Sofa", desc:"Fabric or leather", price:120, group:"Upholstery" },
        { id:"seat", name:"Sofa Per Seat", desc:"Useful for corner sofas", price:40, group:"Upholstery" },
        { id:"armchair", name:"Armchair", desc:"Single chair", price:30, group:"Upholstery" }
      ],
      hotelRooms: {
        rotary: 25,
        hybrid: 30,
        hwe: 35
      },
      rotaryBands: [
        { min:0, max:150, rate:2.50, label:"Up to 150 m²" },
        { min:151, max:399, rate:2.20, label:"151 to 399 m²" },
        { min:400, max:999, rate:2.00, label:"400 to 999 m²" },
        { min:1000, max:Infinity, rate:1.80, label:"1000+ m²" }
      ],
      hybridBands: [
        { min:0, max:150, rate:2.90, label:"Up to 150 m²" },
        { min:151, max:300, rate:2.60, label:"151 to 300 m²" },
        { min:301, max:Infinity, rate:2.40, label:"301+ m²" }
      ],
      hweBands: [
        { min:0, max:150, rate:3.40, label:"Up to 150 m²" },
        { min:151, max:300, rate:3.10, label:"151 to 300 m²" },
        { min:301, max:Infinity, rate:2.80, label:"301+ m²" }
      ],
      hardfloorBands: [
        { min:0, max:150, rate:2.80, label:"Up to 150 m²" },
        { min:151, max:300, rate:2.50, label:"151 to 300 m²" },
        { min:301, max:Infinity, rate:2.20, label:"301+ m²" }
      ]
    };

    const AREA_OPTIONS = [
      "Function room","Hallway","Restaurant","Bar","Reception","Bedroom corridor",
      "Stairs and landing","Meeting room","Lounge","Spa area","Gym","Office",
      "Conference room","Dining area","Ballroom","Entrance lobby","Toilet area",
      "Staff room","Kitchen","Kitchen access area","Banqueting room",
      "Hard floor corridor","Hard floor washroom","Custom"
    ];

    const fmt = n => "£" + (Math.round((Number(n)||0) * 100) / 100).toFixed(2);

    function escapeHtml(str){
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function nl2br(str){
      return escapeHtml(str).replace(/\n/g, "<br>");
    }

    function getPayableTotal(total){
      return total < MINIMUM_CHARGE ? MINIMUM_CHARGE : total;
    }

    function hasAnySelection(){
      return calculate().lines.length > 0;
    }

    function showStep(step){
      currentStep = step;
      document.getElementById("screen1").classList.toggle("hidden", step !== 1);
      document.getElementById("screen2").classList.toggle("hidden", step !== 2);
      document.getElementById("screen3").classList.toggle("hidden", step !== 3);

      updateProgress(step);
      updateStickyButton();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function updateProgress(step){
      [1,2,3].forEach(n => {
        const el = document.getElementById(`progress${n}`);
        el.classList.remove("active","done");
        if (n < step) el.classList.add("done");
        if (n === step) el.classList.add("active");
      });
    }

    function updateStickyButton(){
      const btn = document.getElementById("stickyStepBtn");
      if (currentStep === 1){
        btn.textContent = "Next step";
      } else if (currentStep === 2){
        btn.textContent = "Next step";
      } else {
        btn.textContent = "Back to step 1";
      }
    }

    function renderResidentialForm(){
      const el = document.getElementById("residentialFormGrid");
      el.innerHTML = pricing.domestic.map(item => `
        <div class="res-item">
          <div style="min-width:0">
            <h4>${escapeHtml(item.name)}</h4>
            <p>${escapeHtml(item.desc)}</p>
          </div>
          <div class="res-price">${fmt(item.price)} each</div>
          <div class="qty-inline">
            <label for="qty_${escapeHtml(item.id)}">Quantity</label>
            <input
              id="qty_${escapeHtml(item.id)}"
              type="number"
              min="0"
              step="1"
              value="${Number(state.qty[item.id] || 0)}"
              data-domestic-id="${escapeHtml(item.id)}"
            >
          </div>
        </div>
      `).join("");
    }

    function attachResidentialHandlers(){
      document.getElementById("residentialFormGrid").addEventListener("input", (e) => {
        const input = e.target.closest("[data-domestic-id]");
        if (!input) return;
        const id = input.getAttribute("data-domestic-id");
        state.qty[id] = Math.max(0, Number(input.value) || 0);
        renderSelected();
      });
    }

    function renderBandCards(){
      document.getElementById("rotaryBandsDisplay").innerHTML = pricing.rotaryBands.map(b => `<article class="item"><div><h3>${escapeHtml(b.label)}</h3><p>Commercial carpeted area</p><div class="price">${fmt(b.rate)} per m²</div></div></article>`).join("");
      document.getElementById("hybridBandsDisplay").innerHTML = pricing.hybridBands.map(b => `<article class="item"><div><h3>${escapeHtml(b.label)}</h3><p>Hybrid commercial clean</p><div class="price">${fmt(b.rate)} per m²</div></div></article>`).join("") + `<article class="item"><div><h3>Hotel rooms</h3><p>Hybrid Deep Clean room rate</p><div class="price">${fmt(pricing.hotelRooms.hybrid)} per room</div></div></article>`;
      document.getElementById("hweBandsDisplay").innerHTML = pricing.hweBands.map(b => `<article class="item"><div><h3>${escapeHtml(b.label)}</h3><p>Deep restorative carpet clean</p><div class="price">${fmt(b.rate)} per m²</div></div></article>`).join("") + `<article class="item"><div><h3>Hotel rooms</h3><p>Hot water extraction room rate</p><div class="price">${fmt(pricing.hotelRooms.hwe)} per room</div></div></article>`;
      document.getElementById("hardfloorBandsDisplay").innerHTML = pricing.hardfloorBands.map(b => `<article class="item"><div><h3>${escapeHtml(b.label)}</h3><p>Hard floor area</p><div class="price">${fmt(b.rate)} per m²</div></div></article>`).join("");
    }

    function renderPriceEditors(){
      document.getElementById("domesticPriceEditor").innerHTML = pricing.domestic.map(item => `
        <div class="field">
          <label for="price_${escapeHtml(item.id)}">${escapeHtml(item.name)}</label>
          <input id="price_${escapeHtml(item.id)}" type="number" min="0" step="0.01" value="${Number(item.price).toFixed(2)}">
        </div>
      `).join("");

      const makeBandEditor = (targetId, bands, prefix) => {
        document.getElementById(targetId).innerHTML = bands.map((b, i) => `
          <div class="field">
            <label for="${prefix}_${i}">${escapeHtml(b.label)}</label>
            <input id="${prefix}_${i}" type="number" min="0" step="0.01" value="${Number(b.rate).toFixed(2)}">
          </div>
        `).join("");
      };

      document.getElementById("rateHotelRotary").value = Number(pricing.hotelRooms.rotary).toFixed(2);
      document.getElementById("rateHotelHybrid").value = Number(pricing.hotelRooms.hybrid).toFixed(2);
      document.getElementById("rateHotelHwe").value = Number(pricing.hotelRooms.hwe).toFixed(2);

      makeBandEditor("rotaryEditor", pricing.rotaryBands, "rotaryRate");
      makeBandEditor("hybridEditor", pricing.hybridBands, "hybridRate");
      makeBandEditor("hweEditor", pricing.hweBands, "hweRate");
      makeBandEditor("hardfloorEditor", pricing.hardfloorBands, "hardfloorRate");
    }

    function applyPriceChanges(){
      pricing.domestic.forEach(item => {
        const el = document.getElementById(`price_${item.id}`);
        if (el) item.price = Math.max(0, Number(el.value) || 0);
      });

      pricing.hotelRooms.rotary = Math.max(0, Number(document.getElementById("rateHotelRotary").value) || 0);
      pricing.hotelRooms.hybrid = Math.max(0, Number(document.getElementById("rateHotelHybrid").value) || 0);
      pricing.hotelRooms.hwe = Math.max(0, Number(document.getElementById("rateHotelHwe").value) || 0);

      pricing.rotaryBands.forEach((b, i) => b.rate = Math.max(0, Number(document.getElementById(`rotaryRate_${i}`).value) || 0));
      pricing.hybridBands.forEach((b, i) => b.rate = Math.max(0, Number(document.getElementById(`hybridRate_${i}`).value) || 0));
      pricing.hweBands.forEach((b, i) => b.rate = Math.max(0, Number(document.getElementById(`hweRate_${i}`).value) || 0));
      pricing.hardfloorBands.forEach((b, i) => b.rate = Math.max(0, Number(document.getElementById(`hardfloorRate_${i}`).value) || 0));

      renderResidentialForm();
      renderBandCards();
      renderSelected();
      alert("Prices updated.");
    }

    function getBands(method){
      if (method === "rotary") return pricing.rotaryBands;
      if (method === "hybrid") return pricing.hybridBands;
      if (method === "hardfloor") return pricing.hardfloorBands;
      return pricing.hweBands;
    }

    function getMethodLabel(method){
      if (method === "rotary") return "Rotary bonnet";
      if (method === "hybrid") return "Hybrid Deep Clean";
      if (method === "hardfloor") return "Hard floor cleaning";
      return "Hot water extraction";
    }

    function pickBand(m2, bands){
      if (m2 <= 0) return null;
      return bands.find(b => m2 >= b.min && m2 <= b.max) || bands[bands.length - 1];
    }

    function buildAreaOptions(selected){
      let html = `<option value="">Select area</option>`;
      AREA_OPTIONS.forEach(option => {
        html += `<option value="${escapeHtml(option)}" ${selected === option ? "selected" : ""}>${escapeHtml(option)}</option>`;
      });
      return html;
    }

    function getDisplayAreaName(row){
      return row.areaType && row.areaType !== "Custom" ? row.areaType : (row.roomName || "Unnamed area");
    }

    function createRoomRowElement(row, index){
      const sqm = Math.max(0, Number(row.sqm) || 0);
      const band = pickBand(sqm, getBands(row.method));
      const total = band ? sqm * band.rate : 0;
      const bandLabel = band ? band.label : "Waiting for details";

      const wrapper = document.createElement("div");
      wrapper.className = "room-row";
      wrapper.dataset.id = row.id;
      wrapper.innerHTML = `
        <div class="room-top">
          <div class="room-badge">Area ${index + 1}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn primary small" type="button" data-role="edit" data-id="${row.id}">Edit</button>
            <button class="btn red small" type="button" data-role="remove" data-id="${row.id}">Remove</button>
          </div>
        </div>
        <div class="list">
          <div class="line">
            <div>
              <b>${escapeHtml(getDisplayAreaName(row))}</b>
              <small>${escapeHtml(getMethodLabel(row.method))} · ${sqm} m² · ${bandLabel}</small>
            </div>
            <div class="money">${fmt(total)}</div>
          </div>
        </div>
      `;
      return wrapper;
    }

    function renderRoomRows(){
      const wrap = document.getElementById("roomList");
      if (!roomRows.length){
        wrap.innerHTML = `<div class="mutebox">No commercial areas added yet. Click Add area to start building the commercial quote.</div>`;
        return;
      }
      wrap.innerHTML = "";
      roomRows.forEach((row, index) => wrap.appendChild(createRoomRowElement(row, index)));
    }

    function addRoomRow(data = {}){
      roomCounter += 1;
      roomRows.push({
        id: roomCounter,
        areaType: data.areaType || "",
        roomName: data.roomName || "",
        method: data.method || "",
        sqm: Number(data.sqm || 0)
      });
      renderRoomRows();
      renderSelected();
    }

    function removeRoomRow(id){
      roomRows = roomRows.filter(r => r.id !== id);
      renderRoomRows();
      renderSelected();
    }

    function resetCommercialOnly(){
      roomRows = [];
      roomCounter = 0;
      editingRoomId = null;
      document.getElementById("hotelRoomMethod").value = "rotary";
      document.getElementById("hotelRoomQty").value = 0;
      document.getElementById("furnitureMoveDesc").value = "";
      document.getElementById("furnitureMovePrice").value = 0;
      document.getElementById("extrasDesc").value = "";
      document.getElementById("extrasPrice").value = 0;
      renderRoomRows();
      renderSelected();
    }

    function clearModalErrors(){
      ["modalAreaType","modalRoomName","modalMethod","modalSqm"].forEach(id => {
        document.getElementById(id).classList.remove("input-error");
      });
      ["areaTypeError","roomNameError","methodError","sqmError"].forEach(id => {
        document.getElementById(id).style.display = "none";
      });
    }

    function populateModalAreaOptions(selected){
      document.getElementById("modalAreaType").innerHTML = buildAreaOptions(selected || "");
    }

    function updateCustomNameRequirement(){
      const areaType = document.getElementById("modalAreaType").value;
      const roomNameInput = document.getElementById("modalRoomName");
      roomNameInput.disabled = areaType !== "Custom";
      if (areaType !== "Custom") roomNameInput.value = "";
    }

    function updateModalPreview(){
      const areaType = document.getElementById("modalAreaType").value;
      const method = document.getElementById("modalMethod").value;
      const sqm = Math.max(0, Number(document.getElementById("modalSqm").value) || 0);

      updateCustomNameRequirement();

      if (!areaType || !method || sqm <= 0){
        document.getElementById("modalBand").textContent = "Waiting for details";
        document.getElementById("modalRate").textContent = "—";
        document.getElementById("modalLineTotal").textContent = "£0.00";
        return;
      }

      const band = pickBand(sqm, getBands(method));
      document.getElementById("modalBand").textContent = band ? band.label : "Waiting for details";
      document.getElementById("modalRate").textContent = band ? `${fmt(band.rate)} per m²` : "—";
      document.getElementById("modalLineTotal").textContent = band ? fmt(sqm * band.rate) : "£0.00";
    }

    function openModalForNew(){
      editingRoomId = null;
      document.getElementById("modalTitle").textContent = "Add area";
      populateModalAreaOptions("");
      document.getElementById("modalRoomName").value = "";
      document.getElementById("modalMethod").value = "";
      document.getElementById("modalSqm").value = "";
      clearModalErrors();
      updateModalPreview();
      document.getElementById("roomModal").classList.add("show");
    }

    function openModalForEdit(id){
      const row = roomRows.find(r => r.id === id);
      if (!row) return;
      editingRoomId = id;
      document.getElementById("modalTitle").textContent = "Edit area";
      populateModalAreaOptions(row.areaType || "");
      document.getElementById("modalRoomName").value = row.roomName || "";
      document.getElementById("modalMethod").value = row.method || "";
      document.getElementById("modalSqm").value = row.sqm || "";
      clearModalErrors();
      updateModalPreview();
      document.getElementById("roomModal").classList.add("show");
    }

    function closeModal(){
      document.getElementById("roomModal").classList.remove("show");
      editingRoomId = null;
      clearModalErrors();
    }

    function validateModal(){
      clearModalErrors();
      const areaType = document.getElementById("modalAreaType").value.trim();
      const roomName = document.getElementById("modalRoomName").value.trim();
      const method = document.getElementById("modalMethod").value.trim();
      const sqm = Number(document.getElementById("modalSqm").value);
      let ok = true;

      if (!areaType){
        document.getElementById("modalAreaType").classList.add("input-error");
        document.getElementById("areaTypeError").style.display = "block";
        ok = false;
      }
      if (areaType === "Custom" && !roomName){
        document.getElementById("modalRoomName").classList.add("input-error");
        document.getElementById("roomNameError").style.display = "block";
        ok = false;
      }
      if (!method){
        document.getElementById("modalMethod").classList.add("input-error");
        document.getElementById("methodError").style.display = "block";
        ok = false;
      }
      if (!(sqm > 0)){
        document.getElementById("modalSqm").classList.add("input-error");
        document.getElementById("sqmError").style.display = "block";
        ok = false;
      }
      return ok;
    }

    function saveModal(){
      if (!validateModal()) return;

      const areaType = document.getElementById("modalAreaType").value;
      const roomName = document.getElementById("modalRoomName").value.trim();
      const method = document.getElementById("modalMethod").value;
      const sqm = Math.max(0, Number(document.getElementById("modalSqm").value) || 0);

      if (editingRoomId === null){
        addRoomRow({ areaType, roomName, method, sqm });
      } else {
        const row = roomRows.find(r => r.id === editingRoomId);
        if (row){
          row.areaType = areaType;
          row.roomName = roomName;
          row.method = method;
          row.sqm = sqm;
          renderRoomRows();
          renderSelected();
        }
      }
      closeModal();
    }

    function calculate(){
      let subtotal = 0;
      const lines = [];

      pricing.domestic.forEach(it => {
        const q = Number(state.qty[it.id] || 0);
        if (!q) return;
        const rowTotal = q * it.price;
        subtotal += rowTotal;
        lines.push({
          roomName: it.name,
          method: it.name,
          methodKey: "domestic",
          sqm: "",
          band: "Fixed price",
          rate: it.price,
          total: rowTotal,
          qtyRooms: q,
          group: it.group
        });
      });

      roomRows.forEach(row => {
        const sqm = Math.max(0, Number(row.sqm) || 0);
        if (!sqm || !row.method) return;
        const band = pickBand(sqm, getBands(row.method));
        if (!band) return;
        const total = sqm * band.rate;
        subtotal += total;
        lines.push({
          roomName: getDisplayAreaName(row),
          method: getMethodLabel(row.method),
          methodKey: row.method,
          sqm,
          band: band.label,
          rate: band.rate,
          total,
          group: "Commercial Work"
        });
      });

      const hotelRoomQty = Math.max(0, Number(document.getElementById("hotelRoomQty").value) || 0);
      const hotelRoomMethod = document.getElementById("hotelRoomMethod").value;
      if (hotelRoomQty > 0){
        let rate = pricing.hotelRooms.rotary;
        let method = "Rotary bonnet hotel room";
        let methodKey = "rotary";
        if (hotelRoomMethod === "hybrid"){ rate = pricing.hotelRooms.hybrid; method = "Hybrid Deep Clean hotel room"; methodKey = "hybrid"; }
        if (hotelRoomMethod === "hwe"){ rate = pricing.hotelRooms.hwe; method = "Hot water extraction hotel room"; methodKey = "hwe"; }
        const total = hotelRoomQty * rate;
        subtotal += total;
        lines.push({
          roomName:"Hotel rooms",
          method,
          methodKey,
          sqm:"",
          band:"Room rate",
          rate,
          total,
          qtyRooms:hotelRoomQty,
          group:"Commercial Work"
        });
      }

      const furnitureMoveDesc = document.getElementById("furnitureMoveDesc").value.trim() || "Furniture moving";
      const furnitureMovePrice = Math.max(0, Number(document.getElementById("furnitureMovePrice").value) || 0);
      if (furnitureMovePrice > 0){
        subtotal += furnitureMovePrice;
        lines.push({
          roomName:furnitureMoveDesc,
          method:"Manual extra",
          methodKey:"extra",
          sqm:"",
          band:"Furniture moving",
          rate:furnitureMovePrice,
          total:furnitureMovePrice,
          isManualExtra:true,
          group:"Commercial Work"
        });
      }

      const extrasDesc = document.getElementById("extrasDesc").value.trim() || "Chemicals or other extras";
      const extrasPrice = Math.max(0, Number(document.getElementById("extrasPrice").value) || 0);
      if (extrasPrice > 0){
        subtotal += extrasPrice;
        lines.push({
          roomName:extrasDesc,
          method:"Manual extra",
          methodKey:"extra",
          sqm:"",
          band:"Chemicals / other",
          rate:extrasPrice,
          total:extrasPrice,
          isManualExtra:true,
          group:"Commercial Work"
        });
      }

      const includeVat = document.getElementById("includeVat").checked;
      const vat = includeVat ? subtotal * VAT_RATE : 0;
      const total = subtotal + vat;

      return { lines, subtotal, vat, total, includeVat };
    }

    function renderSelected(){
      renderResidentialForm();
      renderBandCards();
      renderRoomRows();

      const result = calculate();
      const payableTotal = getPayableTotal(result.total);

      document.getElementById("totalSticky").textContent = fmt(payableTotal);
      document.getElementById("heroTotal").textContent = fmt(payableTotal);
      document.getElementById("screen1Total").textContent = fmt(payableTotal);
      document.getElementById("reviewDisplayTotal").textContent = fmt(payableTotal);
      document.getElementById("step3Total").textContent = fmt(payableTotal);
      document.getElementById("totalHidden").value = fmt(payableTotal);

      const reviewMinNote = document.getElementById("reviewMinNote");
      const step3MinNote = document.getElementById("step3MinNote");

      if (result.total < MINIMUM_CHARGE) {
        reviewMinNote.textContent = `Based on selected items total of ${fmt(result.total)}. Minimum charge applies, so payable from £100.00.`;
        step3MinNote.textContent = `Based on selected items total of ${fmt(result.total)}. Minimum charge applies, so payable from £100.00.`;
      } else {
        reviewMinNote.textContent = "Your selected items are above the minimum charge.";
        step3MinNote.textContent = "Your selected items are above the minimum charge.";
      }

      const selected = document.getElementById("selectedList");

      if (!result.lines.length) {
        selected.innerHTML = `<div class="mutebox">No items selected yet. Enter your rooms or add commercial areas to see the estimate.</div>`;
      } else {
        let html = result.lines.map(line => {
          const subText = line.isManualExtra
            ? `${line.method} · ${line.band}`
            : line.group === "Commercial Work" && line.qtyRooms
              ? `${line.method} · ${line.qtyRooms} × ${fmt(line.rate)} · ${line.band}`
              : line.group === "Commercial Work" && line.sqm
                ? `${line.method} · ${line.sqm} m² × ${fmt(line.rate)} · ${line.band}`
                : `${line.group} · ${line.qtyRooms} × ${fmt(line.rate)}`;

          return `
            <div class="line">
              <div>
                <b>${escapeHtml(line.roomName)}</b>
                <small>${escapeHtml(subText)}</small>
              </div>
              <div class="money">${fmt(line.total)}</div>
            </div>
          `;
        }).join("");

        html += `
          <div class="hr"></div>
          <div class="line">
            <div><b>Subtotal</b><small>Before VAT</small></div>
            <div class="money">${fmt(result.subtotal)}</div>
          </div>
        `;
        if (result.includeVat){
          html += `
            <div class="line">
              <div><b>VAT</b><small>20 percent added</small></div>
              <div class="money">${fmt(result.vat)}</div>
            </div>
          `;
        }
        html += `
          <div class="line" style="background:linear-gradient(135deg,#f3f7ff,#ffffff)">
            <div>
              <b>Total payable</b>
              <small>${result.total < MINIMUM_CHARGE ? `Selected items total ${fmt(result.total)}. Minimum charge of £100 applies.` : `Instant estimate.`}</small>
            </div>
            <div class="money">${fmt(payableTotal)}</div>
          </div>`;
        selected.innerHTML = html;
      }

      const breakdown = [
        ...result.lines.map(x => `${x.roomName}: ${fmt(x.total)}`),
        `Selected items total: ${fmt(result.total)}`,
        `Total payable: ${fmt(payableTotal)}`,
        `Please note a minimum charge of £100 applies.`
      ].join("\n");

      document.getElementById("breakdown").value = breakdown;
    }

    function unlockDocTools(){

    function buildWhatsIncludedHtml(){
      const data = getDocData();
      const result = calculate();

      const hasResidential = result.lines.some(x => x.group === "Residential");
      const hasRugs = result.lines.some(x => x.group === "Rugs");
      const hasUpholstery = result.lines.some(x => x.group === "Upholstery");
      const hasCommercial = result.lines.some(x => x.group === "Commercial Work");

      const usedMethods = new Set();
      const parts = [];

      if (hasResidential){
        parts.push("Residential carpet cleaning has been included based on the selected rooms and areas.");
      }
      if (hasRugs){
        parts.push("Rug cleaning has been included for the selected rug items.");
      }
      if (hasUpholstery){
        parts.push("Upholstery cleaning has been included for the selected seating items.");
      }

      result.lines.forEach(line => {
        if (line.group !== "Commercial Work" || line.isManualExtra) return;
        if (usedMethods.has(line.methodKey)) return;
        usedMethods.add(line.methodKey);

        if (line.methodKey === "rotary"){
          parts.push("Rotary bonnet cleaning has been selected where appropriate for commercial carpeted areas to improve appearance and refresh the fibres." + (data.includeFreeProtection ? " Complimentary protection has been included at no additional charge." : ""));
        } else if (line.methodKey === "hybrid"){
          parts.push("A hybrid deep clean has been selected for commercial areas requiring a stronger level of cleaning." + (data.includeFreeProtection ? " Complimentary protection has been included at no additional charge." : ""));
        } else if (line.methodKey === "hwe"){
          parts.push("Hot water extraction has been selected for deeper restorative cleaning of commercial carpet areas." + (data.includeFreeProtection ? " Complimentary protection has been included at no additional charge." : ""));
        } else if (line.methodKey === "hardfloor"){
          parts.push("Hard floor cleaning has been included where appropriate to improve the appearance of non carpeted areas.");
        }
      });

      if (!parts.length && hasCommercial){
        parts.push("Commercial cleaning services have been included based on the selected areas.");
      }

      if (!parts.length){
        parts.push("Professional cleaning services have been selected based on the items included in this document.");
      }

      return parts.map(p => `<p style="margin:0 0 10px;">${escapeHtml(p)}</p>`).join("");

            ${data.includeWorkText ? `<tr><td colspan="5"><strong>Job note</strong></td></tr><tr><td colspan="5">${escapeHtml(data.invoiceWorkText)}</td></tr>` : ``}
            ${data.includeNotesSection ? `<tr><td colspan="5"><strong>Notes</strong></td></tr><tr><td colspan="5">${nl2br(data.notes)}</td></tr>` : ``}
          </table>
        </body>
        </html>
      `;

      const blob = new Blob([excelHtml], { type: "application/vnd.ms-excel;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "jw_invoice.xls";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function handleSubmit(event){
      event.preventDefault();
      alert("Quote request captured on the page. Add your form endpoint or email handler to make this send automatically.");
      return false;
    }

    document.getElementById("unlockDocsBtn").addEventListener("click", unlockDocTools);
    document.getElementById("docPassword").addEventListener("keydown", e => {
      if (e.key === "Enter") unlockDocTools();
    });

    document.getElementById("applyPricingBtn").addEventListener("click", applyPriceChanges);

    document.getElementById("previewQuoteBtnPublic").addEventListener("click", openQuotePreview);
    document.getElementById("pdfQuoteBtnPublic").addEventListener("click", () => openDocumentInPage("quote"));
    document.getElementById("stickyPdfBtn").addEventListener("click", () => openDocumentInPage("quote"));
    document.getElementById("step3ViewQuoteBtn").addEventListener("click", () => openDocumentInPage("quote"));

    document.getElementById("previewQuoteBtnPrivate").addEventListener("click", openQuotePreview);
    document.getElementById("pdfQuoteBtnPrivate").addEventListener("click", () => openDocumentInPage("quote"));
    document.getElementById("excelQuoteBtn").addEventListener("click", downloadExcelQuote);
    document.getElementById("pdfInvoiceBtn").addEventListener("click", () => openDocumentInPage("invoice"));
    document.getElementById("excelInvoiceBtn").addEventListener("click", downloadExcelInvoice);

    document.getElementById("previewOpenPdfBtn").addEventListener("click", () => openDocumentInPage("quote"));
    document.getElementById("previewOpenExcelBtn").addEventListener("click", downloadExcelQuote);
    document.getElementById("closePreviewBtn").addEventListener("click", closeQuotePreview);
    document.getElementById("quotePreviewModal").addEventListener("click", e => {
      if (e.target.id === "quotePreviewModal") closeQuotePreview();
    });

    document.getElementById("printDocumentBtn").addEventListener("click", printCurrentDocument);
    document.getElementById("closeDocumentBtn").addEventListener("click", closeDocumentModal);
    document.getElementById("documentModal").addEventListener("click", e => {
      if (e.target.id === "documentModal") closeDocumentModal();
    });

    document.getElementById("addRoomTop").addEventListener("click", openModalForNew);
    document.getElementById("resetCommercialBtn").addEventListener("click", resetCommercialOnly);
    document.getElementById("saveModalBtn").addEventListener("click", saveModal);
    document.getElementById("cancelModalBtn").addEventListener("click", closeModal);
    document.getElementById("roomModal").addEventListener("click", e => {
      if (e.target.id === "roomModal") closeModal();
    });

    ["modalAreaType","modalRoomName","modalMethod","modalSqm"].forEach(id => {
      document.getElementById(id).addEventListener("input", updateModalPreview);
      document.getElementById(id).addEventListener("change", updateModalPreview);
    });

    document.getElementById("roomList").addEventListener("click", e => {
      const editBtn = e.target.closest("[data-role='edit']");
      if (editBtn){
        openModalForEdit(Number(editBtn.dataset.id));
        return;
      }
      const removeBtn = e.target.closest("[data-role='remove']");
      if (removeBtn){
        removeRoomRow(Number(removeBtn.dataset.id));
      }
    });

    document.querySelectorAll(".commercial-band").forEach(detail => {
      detail.addEventListener("toggle", () => {
        if (detail.open){
          document.querySelectorAll(".commercial-band").forEach(other => {
            if (other !== detail) other.open = false;
          });
        }
      });
    });

    [
      "hotelRoomQty","hotelRoomMethod","includeVat","includeFreeProtection","furnitureMoveDesc","furnitureMovePrice",
      "extrasDesc","extrasPrice","clientNameDoc","siteNameDoc","addressDoc","quoteRef","invoiceRef",
      "invoiceDueDate","descriptionDoc","quoteIntro","quoteWorkText","invoiceWorkText",
      "commercialSectionText","quoteNotesDoc"
    ].forEach(id => {
      const el = document.getElementById(id);
      if (el){
        el.addEventListener("input", renderSelected);
        el.addEventListener("change", renderSelected);
      }
    });

    document.getElementById("toStep2Btn").addEventListener("click", () => {
      if (!hasAnySelection()){
        alert("Please enter at least one room or item before going to step 2.");
        return;
      }
      showStep(2);
    });

    document.getElementById("toStep3Btn").addEventListener("click", () => {
      if (!hasAnySelection()){
        alert("Please enter at least one room or item before going to step 3.");
        return;
      }
      showStep(3);
    });

    document.getElementById("backToStep1Btn").addEventListener("click", () => showStep(1));
    document.getElementById("backToStep2Btn").addEventListener("click", () => showStep(2));

    document.getElementById("stickyStepBtn").addEventListener("click", () => {
      if (currentStep === 1){
        if (!hasAnySelection()){
          alert("Please enter at least one room or item before going to the next step.");
          return;
        }
        showStep(2);
      } else if (currentStep === 2){
        if (!hasAnySelection()){
          alert("Please enter at least one room or item before going to the next step.");
          return;
        }
        showStep(3);
      } else {
        showStep(1);
      }
    });

    renderResidentialForm();
    attachResidentialHandlers();
    renderBandCards();
    renderRoomRows();
    renderSelected();
    showStep(1);
    window.handleSubmit = handleSubmit;
  </script>
</body>
</html>
