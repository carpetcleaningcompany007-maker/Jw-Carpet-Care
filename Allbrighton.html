<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Commercial Cleaning Calculator</title>

<style>
  body{
    font-family:Arial,sans-serif;
    padding:20px;
    background:#f4f7fb;
    margin:0;
  }

  .wrap{
    max-width:1000px;
    margin:0 auto;
  }

  .card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
  }

  h1,h2{
    margin-top:0;
    color:#163f7d;
  }

  label{
    display:block;
    font-weight:bold;
    margin-top:10px;
  }

  input,select{
    padding:12px;
    width:100%;
    margin-top:8px;
    margin-bottom:12px;
    border:1px solid #cfd8e3;
    border-radius:8px;
    box-sizing:border-box;
    font-size:16px;
  }

  .checkbox-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0 14px;
  }

  .checkbox-row input{
    width:auto;
    margin:0;
  }

  button{
    padding:12px 16px;
    background:#1f5fbf;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
  }

  button:hover{
    background:#163f7d;
  }

  .line{
    padding:12px 0;
    border-bottom:1px solid #e6edf5;
    font-size:16px;
  }

  .total{
    font-size:28px;
    font-weight:bold;
    color:#17955e;
    margin-top:16px;
  }

  .muted{
    color:#5c6f86;
    font-size:14px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }

  .small-btn{
    background:#cc3838;
    margin-top:12px;
  }

  .small-btn:hover{
    background:#a92c2c;
  }

  @media (max-width: 700px){
    .grid{
      grid-template-columns:1fr;
    }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h1>Commercial Cleaning Calculator</h1>
    <div class="muted">
      Carpet cleaning, office commercial floor tiles, custom £ per m² override, and out of hours plus 30%.
    </div>
  </div>

  <div class="card">
    <h2>Add Area</h2>

    <label for="name">Area Name</label>
    <input id="name" type="text" placeholder="Example: Main Office">

    <div class="grid">
      <div>
        <label for="type">Area Type</label>
        <select id="type">
          <option value="carpet">Carpet</option>
          <option value="tile">Office Commercial Floor Tiles</option>
        </select>
      </div>

      <div>
        <label for="method">Cleaning Method</label>
        <select id="method">
          <option value="hybrid">FibreLife Deep Clean (£4.00)</option>
          <option value="rotary">Rotary Bonnet (£3.00)</option>
          <option value="budget">Budget Commercial Clean (£2.60)</option>
        </select>
      </div>
    </div>

    <label for="sqm">Square Metres</label>
    <input id="sqm" type="number" step="0.01" min="0" placeholder="Enter square metres">

    <div class="checkbox-row">
      <input type="checkbox" id="override">
      <label for="override" style="margin:0;font-weight:normal;">Override price per m²</label>
    </div>

    <label for="customRate">Custom Rate £ per m²</label>
    <input id="customRate" type="number" step="0.01" min="0" placeholder="Enter custom rate if needed">

    <button type="button" onclick="addArea()">Add Area</button>
  </div>

  <div class="card">
    <h2>Extras</h2>

    <div class="checkbox-row">
      <input type="checkbox" id="outOfHours" onchange="render()">
      <label for="outOfHours" style="margin:0;font-weight:normal;">Out of hours plus 30%</label>
    </div>
  </div>

  <div class="card">
    <h2>Quote Breakdown</h2>
    <div id="list"></div>
    <div class="total" id="total">£0.00</div>
    <button type="button" class="small-btn" onclick="resetAll()">Reset All</button>
  </div>
</div>

<script>
  let areas = [];

  function getRate(method){
    if(method === 'hybrid') return 4.00;
    if(method === 'rotary') return 3.00;
    if(method === 'budget') return 2.60;
    return 0;
  }

  function getMethodLabel(method){
    if(method === 'hybrid') return 'FibreLife Deep Clean';
    if(method === 'rotary') return 'Rotary Bonnet';
    if(method === 'budget') return 'Budget Commercial Clean';
    return '';
  }

  function getTypeLabel(type){
    if(type === 'tile') return 'Office Commercial Floor Tiles';
    return 'Carpet';
  }

  function addArea(){
    const name = document.getElementById('name').value.trim();
    const type = document.getElementById('type').value;
    const method = document.getElementById('method').value;
    const sqm = Number(document.getElementById('sqm').value);
    const override = document.getElementById('override').checked;
    const customRate = Number(document.getElementById('customRate').value);

    if(!name){
      alert('Please enter an area name');
      return;
    }

    if(!sqm || sqm <= 0){
      alert('Please enter square metres greater than 0');
      return;
    }

    let rate = override && customRate > 0 ? customRate : getRate(method);

    if(type === 'tile'){
      rate = override && customRate > 0 ? customRate : 2.80;
    }

    areas.push({
      name,
      type,
      method,
      sqm,
      rate
    });

    document.getElementById('name').value = '';
    document.getElementById('sqm').value = '';
    document.getElementById('override').checked = false;
    document.getElementById('customRate').value = '';

    render();
  }

  function removeArea(index){
    areas.splice(index, 1);
    render();
  }

  function resetAll(){
    areas = [];
    document.getElementById('name').value = '';
    document.getElementById('sqm').value = '';
    document.getElementById('override').checked = false;
    document.getElementById('customRate').value = '';
    document.getElementById('outOfHours').checked = false;
    render();
  }

  function render(){
    let total = 0;
    let html = '';

    if(areas.length === 0){
      html = '<div class="muted">No areas added yet.</div>';
    } else {
      areas.forEach((a, index) => {
        const line = a.sqm * a.rate;
        total += line;

        html += `
          <div class="line">
            <strong>${a.name}</strong><br>
            ${getTypeLabel(a.type)}<br>
            ${a.type === 'tile' ? 'Office Commercial Floor Tile Cleaning' : getMethodLabel(a.method)}<br>
            ${a.sqm.toFixed(2)} m² × £${a.rate.toFixed(2)} = <strong>£${line.toFixed(2)}</strong><br>
            <button type="button" class="small-btn" onclick="removeArea(${index})">Remove</button>
          </div>
        `;
      });
    }

    const outOfHours = document.getElementById('outOfHours').checked;
    if(outOfHours){
      total = total * 1.30;
    }

    document.getElementById('list').innerHTML = html;
    document.getElementById('total').innerText = '£' + total.toFixed(2);
  }
</script>

</body>
</html>
