<script>
  const PASSWORD = "albrighton123";
  const VAT_RATE = 0.20;
  const ROTARY_ROOM_RATE = 25;
  const HWE_ROOM_RATE = 35;

  const ROTARY_BANDS = [
    { min: 0, max: 150, rate: 2.50, label: "Up to 150 m²" },
    { min: 151, max: 399, rate: 2.20, label: "151 to 399 m²" },
    { min: 400, max: 999, rate: 2.00, label: "400 to 999 m²" },
    { min: 1000, max: Infinity, rate: 1.80, label: "1000+ m²" }
  ];

  const HWE_BANDS = [
    { min: 0, max: 150, rate: 3.40, label: "Up to 150 m²" },
    { min: 151, max: 399, rate: 3.10, label: "151 to 399 m²" },
    { min: 400, max: 999, rate: 2.95, label: "400 to 999 m²" },
    { min: 1000, max: Infinity, rate: 2.80, label: "1000+ m²" }
  ];

  let roomRows = [];
  let roomCounter = 0;

  const fmt = n => "£" + (Math.round((Number(n) || 0) * 100) / 100).toFixed(2);

  function escapeHtml(str){
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function pickBand(m2, bands){
    if (m2 <= 0) return null;
    return bands.find(b => m2 >= b.min && m2 <= b.max) || bands[bands.length - 1];
  }

  function getRowTotals(row){
    const sqm = Math.max(0, Number(row.sqm) || 0);
    const isRotary = row.method === "rotary";
    const band = pickBand(sqm, isRotary ? ROTARY_BANDS : HWE_BANDS);
    const unit = band ? band.rate : 0;
    const bandLabel = band ? band.label : "Waiting for square metres";
    const total = sqm > 0 ? sqm * unit : 0;

    return { sqm, band, unit, bandLabel, total };
  }

  function createRoomRowElement(row, index){
    const totals = getRowTotals(row);

    const wrapper = document.createElement("div");
    wrapper.className = "room-row";
    wrapper.dataset.id = row.id;

    wrapper.innerHTML = `
      <div class="room-top">
        <div class="room-badge">Room ${index + 1}</div>
        <button class="btn red small" type="button" data-role="remove" data-id="${row.id}">Remove</button>
      </div>

      <div class="room-grid">
        <div class="field">
          <label>Room or area name</label>
          <input
            type="text"
            value="${escapeHtml(row.roomName)}"
            data-role="room-name"
            data-id="${row.id}"
            placeholder="Example: Kitchen, Corridor, Function Room"
          >
        </div>

        <div class="field">
          <label>Method</label>
          <select data-role="method" data-id="${row.id}">
            <option value="rotary" ${row.method === "rotary" ? "selected" : ""}>Rotary bonnet</option>
            <option value="hwe" ${row.method === "hwe" ? "selected" : ""}>Hot water extraction</option>
          </select>
        </div>

        <div class="field">
          <label>Square metres</label>
          <input
            type="number"
            min="0"
            step="0.1"
            value="${row.sqm}"
            data-role="sqm"
            data-id="${row.id}"
          >
        </div>
      </div>

      <div class="room-meta">
        <div class="meta-box">
          <span>Price band</span>
          <b data-meta="band">${totals.bandLabel}</b>
        </div>
        <div class="meta-box">
          <span>Rate</span>
          <b data-meta="rate">${totals.band ? fmt(totals.unit) + " per m²" : "—"}</b>
        </div>
        <div class="meta-box">
          <span>Line total</span>
          <b data-meta="total">${fmt(totals.total)}</b>
        </div>
      </div>
    `;

    return wrapper;
  }

  function renderRoomRows(){
    const wrap = document.getElementById("roomList");
    wrap.innerHTML = "";

    roomRows.forEach((row, index) => {
      wrap.appendChild(createRoomRowElement(row, index));
    });
  }

  function updateRoomCard(id){
    const row = roomRows.find(r => r.id === id);
    const card = document.querySelector(`.room-row[data-id="${id}"]`);
    if (!row || !card) return;

    const totals = getRowTotals(row);

    const bandEl = card.querySelector('[data-meta="band"]');
    const rateEl = card.querySelector('[data-meta="rate"]');
    const totalEl = card.querySelector('[data-meta="total"]');

    if (bandEl) bandEl.textContent = totals.bandLabel;
    if (rateEl) rateEl.textContent = totals.band ? fmt(totals.unit) + " per m²" : "—";
    if (totalEl) totalEl.textContent = fmt(totals.total);
  }

  function addRoomRow(data = {}){
    roomCounter += 1;
    roomRows.push({
      id: roomCounter,
      roomName: data.roomName || "",
      method: data.method || "rotary",
      sqm: Number(data.sqm || 0)
    });
    renderRoomRows();
    renderSelected();
  }

  function ensureAtLeastOneRow(){
    if (!roomRows.length){
      addRoomRow();
    }
  }

  function removeRoomRow(id){
    roomRows = roomRows.filter(r => r.id !== id);
    if (!roomRows.length){
      roomCounter = 0;
      addRoomRow();
      return;
    }
    renderRoomRows();
    renderSelected();
  }

  function resetAll(){
    roomRows = [];
    roomCounter = 0;
    document.getElementById("hotelRoomMethod").value = "rotary";
    document.getElementById("hotelRoomQty").value = 0;
    document.getElementById("includeVat").checked = false;
    addRoomRow();
  }

  function calculate(){
    let subtotal = 0;
    const lines = [];

    roomRows.forEach(row => {
      const sqm = Math.max(0, Number(row.sqm) || 0);
      if (!sqm) return;

      const isRotary = row.method === "rotary";
      const band = pickBand(sqm, isRotary ? ROTARY_BANDS : HWE_BANDS);
      if (!band) return;

      const lineTotal = sqm * band.rate;
      subtotal += lineTotal;

      lines.push({
        roomName: row.roomName || "Unnamed room",
        method: isRotary ? "Rotary bonnet" : "Hot water extraction",
        sqm,
        band: band.label,
        rate: band.rate,
        total: lineTotal
      });
    });

    const hotelRoomQty = Math.max(0, Number(document.getElementById("hotelRoomQty").value) || 0);
    const hotelRoomMethod = document.getElementById("hotelRoomMethod").value;

    if (hotelRoomQty > 0){
      const unit = hotelRoomMethod === "rotary" ? ROTARY_ROOM_RATE : HWE_ROOM_RATE;
      const methodLabel = hotelRoomMethod === "rotary" ? "Rotary bonnet hotel room" : "Hot water extraction hotel room";
      const lineTotal = hotelRoomQty * unit;

      subtotal += lineTotal;

      lines.push({
        roomName: "Hotel rooms",
        method: methodLabel,
        sqm: "",
        band: "Room rate",
        rate: unit,
        total: lineTotal,
        qtyRooms: hotelRoomQty
      });
    }

    const includeVat = document.getElementById("includeVat").checked;
    const vat = includeVat ? subtotal * VAT_RATE : 0;
    const total = subtotal + vat;

    return { lines, subtotal, vat, total, includeVat };
  }

  function renderSelected(){
    const result = calculate();

    document.getElementById("total").textContent = fmt(result.total);
    document.getElementById("totalSticky").textContent = fmt(result.total);
    document.getElementById("heroTotal").textContent = fmt(result.total);

    const selected = document.getElementById("selectedList");

    if (!result.lines.length){
      selected.innerHTML = `<div class="mutebox">No priced items yet. Start typing square metres or add hotel room quantities.</div>`;
      return;
    }

    let html = result.lines.map(line => {
      const subText = line.qtyRooms
        ? `${line.method} · ${line.qtyRooms} × ${fmt(line.rate)} · ${line.band}`
        : `${line.method} · ${line.sqm} m² × ${fmt(line.rate)} · ${line.band}`;

      return `
        <div class="line">
          <div>
            <b>${line.roomName}</b>
            <small>${subText}</small>
          </div>
          <div class="money">${fmt(line.total)}</div>
        </div>
      `;
    }).join("");

    html += `
      <div class="hr"></div>
      <div class="line">
        <div><b>Subtotal</b><small>Before VAT</small></div>
        <div class="money">${fmt(result.subtotal)}</div>
      </div>
    `;

    if (result.includeVat){
      html += `
        <div class="line">
          <div><b>VAT</b><small>20% added</small></div>
          <div class="money">${fmt(result.vat)}</div>
        </div>
      `;
    }

    html += `
      <div class="line" style="background:linear-gradient(135deg,#f3f7ff,#ffffff)">
        <div><b>Total</b><small>Commercial estimate</small></div>
        <div class="money">${fmt(result.total)}</div>
      </div>
    `;

    selected.innerHTML = html;
  }

  function downloadCsv(){
    const result = calculate();

    const rows = [];
    rows.push(["Albrighton Hall Commercial Quote"]);
    rows.push(["Generated", new Date().toLocaleString()]);
    rows.push([]);
    rows.push(["Room / Area","Method","Square Metres","Band","Rate","Line Total"]);

    result.lines.forEach(line => {
      rows.push([
        line.roomName,
        line.method,
        line.qtyRooms ? `${line.qtyRooms} rooms` : line.sqm,
        line.band,
        fmt(line.rate),
        fmt(line.total)
      ]);
    });

    rows.push([]);
    rows.push(["","","","Subtotal","",fmt(result.subtotal)]);
    if (result.includeVat){
      rows.push(["","","","VAT 20%","",fmt(result.vat)]);
    }
    rows.push(["","","","Final Total","",fmt(result.total)]);

    const csv = rows.map(row =>
      row.map(cell => `"${String(cell ?? "").replace(/"/g, '""')}"`).join(",")
    ).join("\n");

    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "albrighton_hall_quote.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function unlock(){
    const input = document.getElementById("passwordInput");
    const error = document.getElementById("passwordError");

    if (input.value === PASSWORD){
      document.getElementById("gate").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      error.style.display = "none";
    } else {
      error.style.display = "block";
    }
  }

  document.getElementById("unlockBtn").addEventListener("click", unlock);
  document.getElementById("passwordInput").addEventListener("keydown", e => {
    if (e.key === "Enter") unlock();
  });

  document.getElementById("roomList").addEventListener("input", e => {
    const id = Number(e.target.dataset.id);
    const row = roomRows.find(r => r.id === id);
    if (!row) return;

    if (e.target.dataset.role === "room-name") row.roomName = e.target.value;
    if (e.target.dataset.role === "sqm") row.sqm = Number(e.target.value || 0);

    updateRoomCard(id);
    renderSelected();
  });

  document.getElementById("roomList").addEventListener("change", e => {
    const id = Number(e.target.dataset.id);
    const row = roomRows.find(r => r.id === id);
    if (!row) return;

    if (e.target.dataset.role === "method") {
      row.method = e.target.value;
      updateRoomCard(id);
      renderSelected();
    }
  });

  document.getElementById("roomList").addEventListener("click", e => {
    const btn = e.target.closest("[data-role='remove']");
    if (!btn) return;
    removeRoomRow(Number(btn.dataset.id));
  });

  document.getElementById("addRoomTop").addEventListener("click", () => addRoomRow());
  document.getElementById("addRoomBottom").addEventListener("click", () => addRoomRow());
  document.getElementById("resetBtn").addEventListener("click", resetAll);
  document.getElementById("resetTop").addEventListener("click", resetAll);
  document.getElementById("resetSticky").addEventListener("click", resetAll);
  document.getElementById("downloadBtn").addEventListener("click", downloadCsv);

  ["hotelRoomQty","hotelRoomMethod","includeVat"].forEach(id => {
    document.getElementById(id).addEventListener("input", renderSelected);
    document.getElementById(id).addEventListener("change", renderSelected);
  });

  ensureAtLeastOneRow();
  renderSelected();
</script>
