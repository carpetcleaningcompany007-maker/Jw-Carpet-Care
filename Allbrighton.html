<script>
function buildInvoiceStyleQuoteHtml(){
  const result = calculate();
  const clientName = document.getElementById("quoteClientName").value.trim() || "Client name not entered";
  const siteName = document.getElementById("quoteSiteName").value.trim() || "Site name not entered";
  const address = document.getElementById("quoteAddress").value.trim() || "Address not entered";
  const quoteRef = document.getElementById("quoteRef").value.trim() || "Not entered";
  const notes = document.getElementById("quoteNotes").value.trim();
  const date = new Date();
  const dateStr = date.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });

  const companyName = "The Carpet Cleaning Company";
  const companyAddress = [
    "1 Dun Cow Road",
    "Ludlow",
    "SHROPSHIRE",
    "SY8 2BH",
    "UNITED KINGDOM"
  ];

  const serviceLines = result.lines.map(line => {
    let qty = "1.00";
    let unitPrice = line.total;

    if (line.qtyRooms) {
      qty = Number(line.qtyRooms).toFixed(2);
      unitPrice = line.rate;
    } else if (!line.isManualExtra && line.sqm) {
      qty = Number(line.sqm).toFixed(2);
      unitPrice = line.rate;
    }

    return `
      <tr>
        <td>${escapeHtml(line.roomName)}<div class="descsub">${escapeHtml(line.method)}</div></td>
        <td class="num">${qty}</td>
        <td class="num">${Number(unitPrice).toFixed(2)}</td>
        <td class="num">${Number(line.total).toFixed(2)}</td>
      </tr>
    `;
  }).join("");

  const vatLabel = result.includeVat ? "VAT" : "NO VAT";
  const vatValue = result.includeVat ? result.vat : 0;

  return `<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quote</title>
<style>
  body{
    margin:0;
    background:#ececec;
    font-family:Arial, Helvetica, sans-serif;
    color:#111;
    padding:24px;
  }
  .sheet{
    max-width:900px;
    margin:0 auto;
    background:#fff;
    padding:44px 38px 56px;
    box-shadow:0 6px 24px rgba(0,0,0,.08);
  }
  .top{
    display:grid;
    grid-template-columns:1.3fr .7fr .7fr;
    gap:28px;
    align-items:start;
  }
  .quote-title{
    font-size:34px;
    font-weight:300;
    letter-spacing:.02em;
    margin:0 0 8px;
  }
  .block p{
    margin:2px 0;
    font-size:15px;
    line-height:1.45;
  }
  .label{
    font-weight:700;
  }
  .meta-line{
    margin-bottom:10px;
    font-size:15px;
    line-height:1.35;
  }
  .spacer{
    height:86px;
  }
  table{
    width:100%;
    border-collapse:collapse;
  }
  thead th{
    text-align:left;
    font-size:14px;
    padding:10px 6px 8px;
    border-bottom:1px solid #222;
  }
  tbody td{
    font-size:15px;
    padding:10px 6px;
    border-bottom:1px solid #ddd;
    vertical-align:top;
  }
  .descsub{
    margin-top:4px;
    color:#555;
    font-size:13px;
  }
  .num{
    text-align:right;
    white-space:nowrap;
  }
  .totals{
    width:320px;
    margin-left:auto;
    margin-top:8px;
  }
  .totals td{
    padding:6px 0;
    font-size:14px;
  }
  .totals .line td{
    border-top:1px solid #222;
    padding-top:8px;
  }
  .totals .grand td{
    font-weight:700;
    font-size:16px;
    padding-top:8px;
  }
  .due{
    margin-top:36px;
    font-size:15px;
    font-weight:700;
  }
  .notes{
    margin-top:26px;
    font-size:15px;
    line-height:1.6;
  }
  .included{
    margin-top:26px;
    font-size:15px;
    line-height:1.7;
  }
  .included h3, .notes h3{
    margin:0 0 8px;
    font-size:18px;
  }
  .actions{
    max-width:900px;
    margin:0 auto 14px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .btn{
    border:0;
    cursor:pointer;
    padding:12px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
    color:#fff;
    background:#163f7d;
  }
  .btn.green{
    background:#17955e;
  }
  @media print{
    body{
      background:#fff;
      padding:0;
    }
    .actions{
      display:none;
    }
    .sheet{
      box-shadow:none;
      max-width:none;
      padding:32px 28px 40px;
    }
  }
</style>
</head>
<body>
  <div class="actions">
    <button class="btn" onclick="window.print()">Save or print PDF</button>
    <button class="btn green" onclick="window.close()">Close</button>
  </div>

  <div class="sheet">
    <div class="top">
      <div class="block">
        <h1 class="quote-title">QUOTE</h1>
        <p>${escapeHtml(clientName)}</p>
        <p>${escapeHtml(siteName)}</p>
        <p>${nl2br(address)}</p>
      </div>

      <div class="block">
        <div class="meta-line">
          <div class="label">Quote Date</div>
          <div>${escapeHtml(dateStr)}</div>
        </div>
        <div class="meta-line">
          <div class="label">Quote Number</div>
          <div>${escapeHtml(quoteRef)}</div>
        </div>
      </div>

      <div class="block">
        <p>${companyName}</p>
        ${companyAddress.map(line => `<p>${line}</p>`).join("")}
      </div>
    </div>

    <div class="spacer"></div>

    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th class="num">Quantity</th>
          <th class="num">Unit Price</th>
          <th class="num">Amount GBP</th>
        </tr>
      </thead>
      <tbody>
        ${serviceLines || `<tr><td colspan="4">No priced items added</td></tr>`}
      </tbody>
    </table>

    <table class="totals">
      <tr>
        <td>Subtotal</td>
        <td class="num">${Number(result.subtotal).toFixed(2)}</td>
      </tr>
      <tr>
        <td>TOTAL ${vatLabel}</td>
        <td class="num">${Number(vatValue).toFixed(2)}</td>
      </tr>
      <tr class="line grand">
        <td>TOTAL GBP</td>
        <td class="num">${Number(result.total).toFixed(2)}</td>
      </tr>
    </table>

    <div class="due">Quote valid for 30 days from ${escapeHtml(dateStr)}</div>

    <div class="included">
      <h3>What is included</h3>
      <div>${buildCustomerMethodText()}</div>
    </div>

    ${notes ? `
      <div class="notes">
        <h3>Notes</h3>
        <div>${nl2br(notes)}</div>
      </div>
    ` : ""}
  </div>
</body>
</html>`;
}

function buildCustomerMethodText(){
  const result = calculate();
  const used = new Set();
  const parts = [];

  result.lines.forEach(line => {
    if (line.isManualExtra) return;
    const key = line.methodKey || "";
    if (!key || used.has(key)) return;
    used.add(key);

    if (key === "rotary"){
      parts.push("Rotary bonnet cleaning has been selected where appropriate to improve appearance, lift surface soiling, and freshen the carpet quickly. Protection has been added free of charge to help carpets stay cleaner for longer.");
    } else if (key === "hybrid"){
      parts.push("Hybrid Deep Clean has been selected for areas needing a stronger result. This combines bonnet cleaning with targeted hot water extraction for a deeper professional finish. Protection has been added free of charge.");
    } else if (key === "hwe"){
      parts.push("Hot water extraction has been selected as the best method for a deeper restorative carpet clean, helping remove embedded soil and leave the fibres properly refreshed. Protection has been added free of charge.");
    } else if (key === "hardfloor"){
      parts.push("Hard floor cleaning has been included to improve presentation, remove built up traffic soil, and leave the selected areas cleaner and more professional in appearance.");
    }
  });

  if (!parts.length){
    return "Professional cleaning services have been selected based on the areas included in this quote.";
  }

  return parts.map(p => `<p style="margin:0 0 10px;">${escapeHtml(p)}</p>`).join("");
}

function buildCustomerSummaryHtml(){
  const result = calculate();
  const clientName = document.getElementById("quoteClientName").value.trim() || "Your customer";
  const siteName = document.getElementById("quoteSiteName").value.trim() || "Selected site";
  const quoteRef = document.getElementById("quoteRef").value.trim() || "Not entered";

  if (!result.lines.length){
    return `<div class="mutebox">Add at least one complete priced item before opening the customer quote preview.</div>`;
  }

  const lineHtml = result.lines.map(line => {
    let subText = line.isManualExtra
      ? `${line.method} · ${line.band}`
      : line.qtyRooms
        ? `${line.method} · ${line.qtyRooms} rooms`
        : `${line.method} · ${line.sqm} m²`;

    return `
      <div class="line">
        <div>
          <b>${escapeHtml(line.roomName)}</b>
          <small>${escapeHtml(subText)}</small>
        </div>
        <div class="money">${fmt(line.total)}</div>
      </div>
    `;
  }).join("");

  return `
    <div class="preview-box">
      <h4>Quote overview</h4>
      <p>This quote has been prepared for ${escapeHtml(clientName)} for work at ${escapeHtml(siteName)}. Quote reference ${escapeHtml(quoteRef)}.</p>
    </div>

    <div class="preview-grid">
      <div class="preview-box">
        <h4>Included in this quote</h4>
        <div class="preview-list">${lineHtml}</div>
      </div>

      <div class="preview-box">
        <h4>Total quote</h4>
        <p>Subtotal: ${fmt(result.subtotal)}<br>${result.includeVat ? `VAT: ${fmt(result.vat)}<br>` : ""}<strong style="color:#17955e;font-size:32px;line-height:1.4;">Total: ${fmt(result.total)}</strong></p>
      </div>
    </div>

    <div class="preview-box">
      <h4>What the customer will get</h4>
      <p>${buildCustomerMethodText().replace(/<[^>]+>/g, "")}</p>
    </div>
  `;
}

function openPdfQuote(){
  const result = calculate();
  if (!result.lines.length){
    alert("Please add at least one complete priced item before opening the PDF quote.");
    return;
  }

  const html = buildInvoiceStyleQuoteHtml();
  const win = window.open("", "_blank");
  if (!win){
    alert("Popup blocked. Please allow popups for this page.");
    return;
  }
  win.document.open();
  win.document.write(html);
  win.document.close();
}
</script>
